[platformio]
default_envs = release_ttgo_vga32_bluepad

[env]
monitor_speed = 115200
extra_scripts = pre:extraScript.py
custom_prog_name = GALAGINO
custom_prog_version = V3.8.0
board_build.partitions = partitions.csv
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_unflags = -fno-rtti

build_flags =
    -D ARDUINO_RUNNING_CORE=0
    -D BUILD_ENV_NAME=$PIOENV

build_src_flags =
    -Wunknown-pragmas

# ── Entornos originales ───────────────────────────────────────
[env:release_cheapYellowDisplay]
platform = espressif32@6.9.0
framework = arduino
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.9
board = esp32-2432W328C
build_type = release
monitor_raw = yes
build_flags = ${env.build_flags}
    -D CHEAP_YELLOW_DISPLAY_CONF
    -D TFT_SPICLK=80000000
    -D CORE_DEBUG_LEVEL=0

[env:release_azDeliveryDevKitV4]
platform = espressif32@6.9.0
framework = arduino
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.9
board = az-delivery-devkit-v4
build_type = release
monitor_raw = yes
lib_deps =
    https://github.com/dmadison/NintendoExtensionCtrl
build_flags = ${env.build_flags}
    -D TFT_SPICLK=40000000
    -D CORE_DEBUG_LEVEL=0
    -D NUNCHUCK_INPUT

# ── TTGO VGA32 — core 2.0.17 + FabGL ─────────────────────────
[env:release_ttgo_vga32]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
board = esp32dev
upload_speed = 115200
build_type = release
monitor_raw = yes
lib_deps =
    https://github.com/fdivitto/FabGL.git
build_flags = ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    -D KEYBOARD
    -D CORE_DEBUG_LEVEL=0
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -Wl,--print-memory-usage
[env:debug_ttgo_vga32]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
board = esp32dev
build_type = debug
monitor_filters = esp32_exception_decoder
lib_deps =
    https://github.com/fdivitto/FabGL.git
build_flags = ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    -D KEYBOARD
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    

# ── TTGO VGA32 + BLE HID (NimBLE) ────────────────────────────
# Mismo core 2.0.17 que el entorno normal — sin cambiar nada
# NimBLE es una libreria normal, no requiere core especial
[env:release_ttgo_vga32_bt]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
    
board = esp-wrover-kit
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
;upload_speed = 115200
board_build.extra_flags =
    -DBOARD_HAS_PSRAM
    ;-mfix-esp32-psram-cache-issue
build_type = release

lib_deps =
    https://github.com/fdivitto/FabGL.git
    h2zero/NimBLE-Arduino@2.1.0
build_flags =
    ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    -D BT_GAMEPAD_INPUT
    -O2
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wl,--print-memory-usage
[env:debug_ttgo_vga32_bt]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
board = lolin32
build_type = debug
;monitor_raw = yes
monitor_filters = esp32_exception_decoder
lib_deps =
    https://github.com/fdivitto/FabGL.git
    h2zero/NimBLE-Arduino@1.4.1
build_flags = ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    ;-D KEYBOARD
    ;-D BOARD_HAS_PSRAM
    ;-mfix-esp32-psram-cache-issue
    -D BT_GAMEPAD_INPUT
    -D CONFIG_BT_NIMBLE_ENABLED=1
;lib_compat_mode = off

[env:release_ttgo_vga32_bluepad]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32@https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip
board = lolin32
board_build.partitions = huge_app.csv
board_build.extra_flags =
    -DBOARD_HAS_PSRAM
    ;-mfix-esp32-psram-cache-issue
build_type = release
board_build.flash_mode = dio
lib_deps =
    https://github.com/Mamigu2022/FabGL
build_unflags = 
    -Os            
build_flags =
    ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    -D BT_GAMEPAD_INPUT_BLUEPAD
    ;-D DEBUG_TIMING
    ;-D CONFIG_ESP_TASK_WDT_TIMEOUT_S=30
    -O2
    -ffunction-sections
    -fdata-sections
    -ffast-math 
    -fstrict-aliasing  
    -Wl,--gc-sections
    -Wl,--print-memory-usage

[env:debug_ttgo_vga32_bluepad]
platform = espressif32@6.9.0
framework = arduino
platform_packages =
    framework-arduinoespressif32@https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip
board = esp32dev
board_build.partitions = huge_app.csv
board_build.extra_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_type = debug
monitor_raw = yes
board_build.flash_mode = dio
lib_deps =
    https://github.com/fdivitto/FabGL.git
lib_compat_mode = off
monitor_filters = esp32_exception_decoder
build_flags =
    ${env.build_flags}
    -D VIDEO_BACKEND_VGA32
    -D BT_GAMEPAD_INPUT_BLUEPAD
    
